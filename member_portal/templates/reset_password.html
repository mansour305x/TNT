{% extends "base.html" %}
{% block content %}
<div class="auth-center-wrap">
  <div class="auth-panel-single panel">
    <h2 class="auth-panel-title">{{ 'Reset Password' if lang == 'en' else 'إعادة تعيين كلمة المرور' }}</h2>

    <form method="post" action="/reset-password" class="stacked">
      <input type="hidden" name="token" value="{{ token }}" />
      <label>
        <span>{{ 'New Password' if lang == 'en' else 'كلمة المرور الجديدة' }}</span>
        <input type="password" name="new_password" autocomplete="new-password" required minlength="6" />
      </label>
      <button class="btn btn-primary full-btn" type="submit">{{ 'Save New Password' if lang == 'en' else 'حفظ كلمة المرور الجديدة' }}</button>
    </form>

    <p class="register-link-line">
      <a href="/">{{ 'Back to sign in' if lang == 'en' else 'العودة لتسجيل الدخول' }}</a>
    </p>
  </div>
</div>
{% endblock %}
