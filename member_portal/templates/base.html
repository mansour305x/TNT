<!DOCTYPE html>
<html lang="{{ 'ar' if lang == 'ar' else 'en' }}" dir="{{ 'rtl' if lang == 'ar' else 'ltr' }}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title }}</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <div class="page-bg" aria-hidden="true"></div>

  <header class="topbar">
    <a class="brand" href="{{ '/portal' if current_user else '/' }}">
      <span class="brand-badge">TNT</span>
      <span class="brand-text">
        <strong>تحالف TNT</strong>
        <small>TNT Alliance</small>
      </span>
    </a>

    <nav class="nav-links">
      {% if current_user %}
      <a href="/portal">البوابة</a>
      {% if current_user.is_admin %}
      <a href="/dashboard">لوحة التحكم</a>
      {% endif %}
      <span class="user-chip">@{{ current_user.username }}</span>
      <a class="btn btn-ghost" href="/logout">خروج</a>
      {% endif %}

      <form method="post" action="/set-language" class="lang-form">
        <input type="hidden" name="next" value="{{ '/portal' if current_user else '/' }}" />
        <select name="lang" aria-label="Language" onchange="this.form.submit()">
          <option value="ar" {% if lang == 'ar' %}selected{% endif %}>العربية</option>
          <option value="en" {% if lang == 'en' %}selected{% endif %}>English</option>
          <option value="external">All Languages (Google)</option>
        </select>
        <select name="external_lang" class="external-lang">
          <option value="fr">French</option>
          <option value="de">German</option>
          <option value="es">Spanish</option>
          <option value="tr">Turkish</option>
          <option value="ru">Russian</option>
          <option value="ur">Urdu</option>
          <option value="hi">Hindi</option>
          <option value="id">Indonesian</option>
          <option value="pt">Portuguese</option>
          <option value="it">Italian</option>
          <option value="ja">Japanese</option>
          <option value="ko">Korean</option>
          <option value="zh-CN">Chinese</option>
        </select>
      </form>
    </nav>
  </header>

  {% if flash %}
  <div class="flash flash-{{ flash.level }}">{{ flash.text }}</div>
  {% endif %}

  <main class="container">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
