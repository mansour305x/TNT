  {% endif %}

  <main>
    {% block content %}{% endblock %}
  </main>

  <div id="google_translate_element" class="translate-anchor" aria-hidden="true"></div>

  <script>
    function initGoogleTranslate() {
      new google.translate.TranslateElement(
        { pageLanguage: "en", autoDisplay: false },
        "google_translate_element"
      );
    }

    function setTranslateCookie(languageCode) {
      var value = "/en/" + languageCode;
      document.cookie = "googtrans=" + value + ";path=/;max-age=31536000";
      document.cookie = "googtrans=" + value + ";domain=" + location.hostname + ";path=/;max-age=31536000";
    }

    function getCurrentLangFromCookie() {
      var cookies = document.cookie.split(";");
      for (var i = 0; i < cookies.length; i++) {
        var c = cookies[i].trim();
        if (c.indexOf("googtrans=") === 0) {
          var val = c.substring("googtrans=".length);
          var parts = val.split("/");
          return parts[2] || "en";
        }
      }
      return "en";
    }

    document.addEventListener("DOMContentLoaded", function () {
      var select = document.getElementById("language-switcher");
      if (!select) {
        return;
      }

      var activeLang = getCurrentLangFromCookie();
      if (activeLang) {
        select.value = activeLang;
      }

      select.addEventListener("change", function () {
        var code = select.value || "en";
        setTranslateCookie(code);
        location.reload();
      });
    });
  </script>
  <script src="//translate.google.com/translate_a/element.js?cb=initGoogleTranslate"></script>
