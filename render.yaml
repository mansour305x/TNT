services:
  - type: web
    name: tnt-portal
    runtime: python
    plan: free
    rootDir: member_portal
    buildCommand: pip install -r requirements-new.txt
    startCommand: python app_new.py
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # ── Application ──────────────────────────────────────
      - key: ENVIRONMENT
        value: production
      - key: PORTAL_SECRET_KEY
        generateValue: true
      - key: PORT
        value: "10000"

      # ── Database (persistent disk) ───────────────────────
      - key: PORTAL_DB_PATH
        value: /var/data/portal.db

      # ── Owner account (seeded on first run) ──────────────
      - key: OWNER_USERNAME
        value: DANGER
      - key: OWNER_PASSWORD
        value: Aa@123456

      # ── Google OAuth2 ─────────────────────────────────────
      # Set these in the Render dashboard manually:
      - key: GOOGLE_CLIENT_ID
        value: ""
      - key: GOOGLE_CLIENT_SECRET
        value: ""
      - key: GOOGLE_REDIRECT_URI
        value: https://tnt-portal.onrender.com/oauth/google/callback

      # ── Discord OAuth2 ────────────────────────────────────
      - key: DISCORD_CLIENT_ID
        value: ""
      - key: DISCORD_CLIENT_SECRET
        value: ""
      - key: DISCORD_REDIRECT_URI
        value: https://tnt-portal.onrender.com/oauth/discord/callback

      # ── SMTP / Email ──────────────────────────────────────
      - key: SMTP_SERVER
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        value: ""
      - key: SMTP_PASSWORD
        value: ""
      - key: FROM_EMAIL
        value: ""
      - key: FROM_NAME
        value: "TNT Alliance"

    disk:
      name: tnt-data
      mountPath: /var/data
      sizeGB: 1

