name: Render Keepalive

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping render health endpoint
        run: |
          set -e
          URL="https://tnt-2.onrender.com/healthz"
          echo "Pinging $URL"
          code=$(curl -sS -o /tmp/resp.txt -w "%{http_code}" "$URL")
          echo "HTTP $code"
          cat /tmp/resp.txt || true
          if [ "$code" != "200" ]; then
            echo "Health check failed"
            exit 1
          fi
